<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>יוסטון – תשלומים וחשבוניות | מרכז הלמידה בראונשטיין</title>
  <meta name="theme-color" content="#2563eb" />
  <meta name="description" content="עדכון אמצעי תשלום, חשבוניות ובירורי חיוב למנויי מרכז הלמידה בראונשטיין." />
  <link rel="icon" href="../../assets/brand-logo.svg" type="image/svg+xml" />

  <!-- פונט ועיצוב גלובלי -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../styles.light.css?v=5" />
</head>
<body class="has-toplogo">
  <!-- לוגו מותג קבוע (קובץ: /public/assets/IMG_9789.jpeg) -->
  <a class="toplogo" href="../../index.html" aria-label="בראונשטיין – דף הבית">
    <img src="../../assets/IMG_9789.jpeg" alt="לוגו בראונשטיין" loading="eager" fetchpriority="high">
  </a>

  <main class="wrap">
    <section class="card wizard-wrap">
      <!-- טופ־בר נקי (ללא inline styles) -->
      <div class="topbar">
        <div class="right" style="display:flex;gap:8px;align-items:center">
          <button class="btn" id="backBtn" disabled>חזרה</button>
        </div>
        <div class="left" style="display:flex;gap:8px;align-items:center">
          <button class="btn ghost" onclick="location.href='index.html'">תפריט מנוי/ה</button>
          <button class="btn ghost" onclick="location.href='../../index.html'">לתפריט ראשי</button>
        </div>
      </div>

      <!-- כותרת -->
      <header class="head">
        <div class="brand" aria-label="תשלומים וחשבוניות">
          <h1 class="title">תשלומים וחשבוניות</h1>
          <p class="subtitle">נרשום כמה פרטים קצרים ונעביר למזכירות 👨‍🚀</p>
        </div>
      </header>

      <!-- אזור התוכן של הוויזארד (מוזן דינמית דרך billing.js) -->
      <div class="wizard-step body" id="step"></div>

      <!-- פוטר סטטוס -->
      <div class="footerbar">
        <span id="statusBox" class="status" aria-live="polite"></span>
      </div>
    </section>
  </main>

  <!-- קונפיג מרכזי (Webhook + Project) -->
  <script src="../js/config.js?v=5"></script>

  <!-- ליבת עזר: ולידציות + שליחה (שומר על IDs: backBtn, step, statusBox) -->
  <script src="../js/chat-core.js?v=5"></script>

  <!-- הזרימה עצמה -->
  <script src="../js/flows/billing.js?v=5"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => window.BillingWizard?.start?.());
  </script>
</body>
</html>
