<!-- /public/branches/branch1/boost-onetime.html
     "שיעור חד־פעמי על בסיס מקום פנוי" – ויזארד רב־שלבי בעיצוב אחיד -->
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>יוסטון – שיעור חד־פעמי | מרכז הלמידה בראונשטיין</title>
  <meta name="theme-color" content="#2563eb" />
  <meta name="description" content="בקשת שיעור חד־פעמי על בסיס מקום פנוי במרכז הלמידה בראונשטיין." />
  <link rel="icon" href="../../assets/brand-logo.svg" type="image/svg+xml" />

  <!-- פונט ועיצוב גלובלי -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../styles.light.css?v=5" />
</head>
<body class="has-toplogo">
  <!-- לוגו מותג קבוע -->
  <a class="toplogo" href="../../index.html" aria-label="בראונשטיין – דף הבית">
    <img src="../../assets/IMG_9789.jpeg" alt="לוגו בראונשטיין" loading="eager" fetchpriority="high">
  </a>

  <main class="wrap">
    <section class="card wizard-wrap">
      <!-- טופ־בר -->
      <div class="topbar">
        <div class="right" style="display:flex;gap:8px;align-items:center">
          <button class="btn" id="backBtn" disabled>חזרה</button>
        </div>
        <div class="left" style="display:flex;gap:8px;align-items:center">
          <button class="btn ghost" onclick="location.href='../../index.html'">לתפריט ראשי</button>
        </div>
      </div>

      <!-- כותרת -->
      <header class="head">
        <div class="brand" aria-label="שיעור חד־פעמי על בסיס מקום פנוי">
          <h1 class="title">שיעור חד־פעמי על בסיס מקום פנוי</h1>
          <p class="subtitle">👨‍🚀 נזין כמה פרטים קצרים ונשלח למזכירות</p>
        </div>
      </header>

      <!-- תוכן הוויזארד -->
      <div class="wizard-step body" id="step"></div>

      <!-- פוטר סטטוס -->
      <div class="footerbar">
        <span id="statusBox" class="status" aria-live="polite"></span>
      </div>
    </section>
  </main>

  <!-- קונפיג מרכזי (Webhook + Project); זרימה זו משתמשת בדיפלוי onetime -->
  <script src="../js/config.js?v=5" data-endpoint="onetime"></script>

  <!-- ליבה (ולידציה + שליחה) -->
  <script src="../js/chat-core.js?v=5"></script>

  <!-- זרימת שיעור חד־פעמי -->
  <script src="../js/flows/boost-onetime.js?v=7"></script>
  <script>
    // הפעלה בטוחה של הוויזארד
    window.addEventListener('DOMContentLoaded', () => {
      try { window.OneTimeWizard?.start?.(); }
      catch (e) {
        console.error('OneTimeWizard start error:', e);
        const status = document.getElementById('statusBox');
        if (status) status.textContent = 'שגיאת טעינה – רעננו את הדף או נסו שוב בעוד רגע';
      }
    });
  </script>
</body>
</html>
